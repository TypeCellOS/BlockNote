<div class="bn-block-group" data-node-type="blockGroup">
  <div class="bn-block-outer" data-node-type="blockOuter" data-id="1">
    <div class="bn-block" data-node-type="blockContainer" data-id="1">
      <div class="bn-block-content" data-content-type="table">
        <div class="tableWrapper">
          <div class="tableWrapper-inner"></div>
          <table
            class="bn-inline-content"
            style="--default-cell-min-width: 120px;"
            data-show-children="true"
          >
            <colgroup>
              <col style="width: 199px;" />
              <col style="width: 148px;" />
              <col style="width: 201px;" />
            </colgroup>
            <tr>
              <th data-text-alignment="center" colspan="1" rowspan="1" colwidth="199">
                <p>This row has headers</p>
              </th>
              <th
                data-background-color="red"
                data-text-alignment="center"
                colspan="1"
                rowspan="1"
                colwidth="148"
              >
                <p>
                  This is
                  <strong>RED</strong>
                </p>
              </th>
              <th
                data-text-color="blue"
                data-text-alignment="center"
                colspan="1"
                rowspan="1"
                colwidth="201"
              >
                <p>Text is Blue</p>
              </th>
            </tr>
            <tr>
              <td data-background-color="yellow" colspan="2" rowspan="2" colwidth="199,148">
                <p>
                  This spans 2 columns
                  <br />
                  and 2 rows
                </p>
              </td>
              <td data-background-color="gray" colspan="1" rowspan="1" colwidth="201">
                <p>Sooo many features</p>
              </td>
            </tr>
            <tr>
              <td
                data-text-color="purple"
                data-background-color="gray"
                colspan="1"
                rowspan="1"
                colwidth="201"
              >
                <p></p>
              </td>
            </tr>
            <tr>
              <td colspan="1" rowspan="1" colwidth="199">
                <p>A cell</p>
              </td>
              <td data-text-alignment="right" colspan="1" rowspan="1" colwidth="148">
                <p>Another Cell</p>
              </td>
              <td data-text-alignment="center" colspan="1" rowspan="1" colwidth="201">
                <p>Aligned center</p>
              </td>
            </tr>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
