packages:
  - "packages/*"
  - "examples/*/*"
  - "playground"
  - "fumadocs"
  - "docs"
  - "shared"
  - "tests"
preferWorkspacePackages: true
linkWorkspacePackages: true
gitChecks: false
minimumReleaseAge: 1440
publicHoistPattern:
  # We have been preferring to use `prosemirror-*` packages instead of `@tiptap/pm` packages
  - "prosemirror-*"
overrides:
  "@headlessui/react": "^2.2.4"
  "@tiptap/core": "^3.0.0"
  "@tiptap/pm": "^3.0.0"
  "vitest": "4.1.2"
  "@vitest/runner": "4.1.2"
  "@y/prosemirror>lib0": "1.0.0-rc.13"
allowBuilds:
  "@parcel/watcher": true
  "@sentry/cli": true
  "@tailwindcss/oxide": true
  better-sqlite3: true
  esbuild: true
  msw: true
  nx: true
  unrs-resolver: true
  canvas: false
  sharp: false
  workerd: false
  leveldown: false
patchedDependencies:
  "@y/prosemirror@2.0.0-2": "patches/@y__prosemirror@2.0.0-2.patch"
