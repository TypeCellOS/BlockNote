packages:
  - "packages/*"
  - "examples/*/*"
  - "playground"
  - "fumadocs"
  - "docs"
  - "shared"
  - "tests"
preferWorkspacePackages: true
linkWorkspacePackages: true
gitChecks: false
minimumReleaseAge: 1440
publicHoistPattern:
  # We have been preferring to use `prosemirror-*` packages instead of `@tiptap/pm` packages
  - "prosemirror-*"
overrides:
  "@headlessui/react": "^2.2.4"
  "@tiptap/core": "^3.0.0"
  "@tiptap/pm": "^3.0.0"
  "vitest": "4.1.7"
  "@vitest/runner": "4.1.7"
  # Force the whole @y/* v14 ecosystem (@y/prosemirror, @y/y, @y/protocols,
  # @y/websocket — all declare lib0 ^1.0.0-rc.13) onto the single patched
  # lib0 rc.14, so the matchNodes diff patch is the only lib0 delta instance.
  "lib0": "1.0.0-rc.14"
allowBuilds:
  "@parcel/watcher": true
  "@sentry/cli": true
  "@tailwindcss/oxide": true
  better-sqlite3: true
  esbuild: true
  msw: true
  nx: true
  unrs-resolver: true
  canvas: false
  sharp: false
  workerd: false
  leveldown: false
patchedDependencies:
  "@y/prosemirror@2.0.0-2": "patches/@y__prosemirror@2.0.0-2.patch"
  lib0@1.0.0-rc.14: patches/lib0@1.0.0-rc.14.patch
