name: build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, edited]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 100

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - name: Install Dependencies
        run: vp install

      - name: Lint packages
        run: vp lint

      - name: Build packages
        run: vp run -r build

      - name: Run unit tests
        run: vp run -r test

      - name: Run Next.js integration test (production build)
        run: NEXTJS_TEST_MODE=build vp test run src/unit/nextjs/serverUtil.test.ts
        working-directory: tests

      - name: Upload webpack stats artifact (editor)
        uses: relative-ci/agent-upload-artifact-action@v2
        with:
          webpackStatsFile: ./playground/dist/webpack-stats.json
          artifactName: relative-ci-artifacts-editor

      - name: Soft release
        id: soft-release
        run: vp dlx pkg-pr-new publish './packages/*' # TODO disabled only for AI branch--compact

  e2e:
    # Vitest Browser Mode runs in the Playwright Linux container — the same
    # environment as the local Docker run — so behaviour matches local dev.
    # The suite resolves every `@blocknote/*` import to its `src/` via the
    # aliases in `tests/vite.config.browser.ts` (vite transpiles the package
    # sources on the fly), so the packages do NOT need to be built to `dist`
    # first — `vp install` + the checked-out sources are enough.
    name: "E2E - ${{ matrix.browser }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: mcr.microsoft.com/playwright:v1.51.1-noble
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 100

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - name: Install dependencies
        run: vp install

      # No preview server: Vitest Browser Mode serves the tests + mounted example
      # apps itself. `--browser` selects this matrix shard's browser.
      - name: Run e2e tests (${{ matrix.browser }})
        run: HOME=/root vp test -c vite.config.browser.ts --run --browser ${{ matrix.browser }}
        working-directory: tests

      # Navigable HTML report (the `html` reporter writes it here — same as the
      # local `e2e:report` script serves). Uploaded whether the tests pass or
      # fail so the run is always inspectable.
      - name: Upload e2e report (${{ matrix.browser }})
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: e2e-report-${{ matrix.browser }}
          path: tests/playwright-report/
          retention-days: 7

      - name: Upload failure artifacts
        uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: e2e-attachments-${{ matrix.browser }}
          path: tests/.vitest-attachments/
          retention-days: 7
